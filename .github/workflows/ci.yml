name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies with uv
      run: |
        uv sync --all-extras --dev --python ${{ matrix.python-version }}

    - name: Lint with flake8
      run: |
        uv run flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: uv run black --check src tests

    - name: Type check with mypy
      run: uv run mypy src/

    - name: Run tests
      run: uv run pytest

    - name: Test CLI installation
      run: |
        uv run article-cli --version
        uv run article-cli --help

    - name: Generate test summary
      if: always()
      run: |
        echo "## 🧪 Test Results for Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Linting (flake8): Passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Formatting (black): Passed" >> $GITHUB_STEP_SUMMARY  
        echo "- ✅ Type checking (mypy): Passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ CLI installation: Passed" >> $GITHUB_STEP_SUMMARY

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies with uv
      run: uv sync --all-extras --dev --python 3.11

    - name: Build package
      run: uv build

    - name: Check package
      run: uv run twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Generate build summary
      if: always()
      run: |
        echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Package built successfully" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Package validation passed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Artifacts uploaded" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Package Details" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        ls -la dist/ >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
